name: Keep Supabase Alive

on:
  schedule:
    # Ejecutar cada 3 días a las 12:00 UTC (9:00 AM hora CDMX)
    - cron: '0 12 */3 * *'
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub UI

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Query Supabase Database
        run: |
          response=$(curl -s -X GET '${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive?select=*&limit=1' \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}")
          echo "📊 Database Response: $response"

          # Verificar que recibimos datos
          if [ -z "$response" ] || [ "$response" = "[]" ]; then
            echo "❌ Error: No data returned from keep_alive table"
            exit 1
          fi

          echo "✅ Database activity registered successfully!"
          echo "📅 Last ping: $(echo $response | grep -o '"last_ping":"[^"]*"' | cut -d'"' -f4)"
