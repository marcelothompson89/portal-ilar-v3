name: Keep Supabase Alive

on:
  schedule:
    # Ejecutar cada 3 días a las 12:00 UTC (9:00 AM hora CDMX)
    - cron: '0 12 */3 * *'
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub UI

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase Auth Service
        run: |
          curl -X GET '${{ secrets.SUPABASE_URL }}/auth/v1/health' \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}"

      - name: Verify Response
        run: echo "✅ Supabase keep-alive ping successful!"
